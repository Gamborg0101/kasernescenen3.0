name: Kasernescenen CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize bun
        uses: oven-sh/setup-bun@v2

      - name: install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Lint
        run: bun run lint

      - name: Build project
        run: bun run build
